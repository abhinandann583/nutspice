<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutSpice | Secure Checkout</title>
    <link rel="icon" type="image/png" href="./assets/logo.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cart.css">
    <style>
        body { background: #FAF7F0; }
        .checkout-grid { display: grid; grid-template-columns: 1fr 400px; gap: 4rem; max-width: 1200px; margin: 4rem auto; padding: 0 2rem; }
        @media (max-width: 900px) { .checkout-grid { grid-template-columns: 1fr; } }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--dark-brown); }
        .form-input { width: 100%; padding: 1rem; border: 1px solid var(--border-color); border-radius: 8px; font-family: var(--font-body); background: #fff; transition: border 0.3s; }
        .form-input:focus { outline: none; border-color: var(--brand-orange); }
        
        .checkout-summary { background: #fff; border: 1px solid var(--border-color); border-radius: 24px; padding: 2rem; position: sticky; top: 2rem; }
        .summary-item { display: flex; gap: 1rem; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-color); }
        .summary-img { width: 60px; height: 60px; object-fit: contain; }
        
        .payment-box { border: 1px solid var(--border-color); border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 1rem; cursor: pointer; transition: 0.3s; }
        .payment-box.active { border-color: var(--brand-orange); background: rgba(216, 80, 53, 0.05); }
    </style>
</head>
<body class="font-body text-choc-brown">

    <nav class="navbar glass-nav" style="position: relative;">
        <div class="container nav-container">
            <a href="index.html" class="nav-brand magnetic">
                <img src="./assets/logo.png" alt="NutSpice" class="nav-logo">
            </a>
            <div class="nav-links">
                <a href="index.html#flavours" class="magnetic nav-link">Collection</a>
                <a href="index.html#story" class="magnetic nav-link">Our Story</a>
                <a href="index.html#ingredients" class="magnetic nav-link">Ingredients</a>
                <a href="shop.html#comparison" class="magnetic nav-link">Compare</a>
            </div>
            <div class="nav-actions flex align-center" style="gap: 1.5rem;">
                <button class="nav-link magnetic border-none bg-transparent cursor-pointer relative cart-global-btn" id="cart-btn" style="color: var(--dark-brown);">
                    <i class="ph ph-shopping-bag" style="font-size: 1.5rem;"></i>
                    <span id="cart-count" class="absolute bg-brand-orange text-white border-radius-50 flex-center" style="width: 20px; height: 20px; font-size: 0.7rem; top: -5px; right: -10px;">0</span>
                </button>
                <a href="shop.html" class="btn btn-primary magnetic hide-mobile" style="padding: 0.75rem 1.5rem; font-size: 0.8rem;">Shop Now</a>
                <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle Menu">
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- Mobile Overlay Menu -->
    <div class="mobile-menu-overlay" id="mobileMenuOverlay">
        <div class="mobile-menu-content">
            <a href="index.html#flavours" class="mobile-nav-link">Collection</a>
            <a href="index.html#story" class="mobile-nav-link">Our Story</a>
            <a href="index.html#ingredients" class="mobile-nav-link">Ingredients</a>
            <a href="shop.html#comparison" class="mobile-nav-link">Compare</a>
            <a href="shop.html" class="btn btn-primary mt-4 w-100">Shop Now</a>
        </div>
    </div>

    <main class="checkout-grid">
        <div class="checkout-form">
            <h1 class="font-display text-dark-brown text-xl mb-4" style="font-size: 2.5rem;">Secure Checkout</h1>
            
            <h3 class="font-display text-dark-brown text-lg mb-2">Contact Information</h3>
            <div class="grid-2" style="gap: 1.5rem;">
                <div class="form-group">
                    <label class="form-label">First Name</label>
                    <input type="text" class="form-input" placeholder="John">
                </div>
                <div class="form-group">
                    <label class="form-label">Last Name</label>
                    <input type="text" class="form-input" placeholder="Doe">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input" placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label class="form-label">Phone Number</label>
                <input type="tel" class="form-input" placeholder="+91">
            </div>

            <h3 class="font-display text-dark-brown text-lg mt-4 mb-2">Shipping Address</h3>
            <div class="form-group">
                <label class="form-label">Street Address</label>
                <input type="text" class="form-input" placeholder="House number and street name">
            </div>
            <div class="grid-2" style="gap: 1.5rem;">
                <div class="form-group">
                    <label class="form-label">City</label>
                    <input type="text" class="form-input" placeholder="Mumbai">
                </div>
                <div class="form-group">
                    <label class="form-label">Pincode</label>
                    <input type="text" class="form-input" placeholder="400001">
                </div>
            </div>

            <h3 class="font-display text-dark-brown text-lg mt-4 mb-2">Payment Method</h3>
            <div class="payment-box active">
                <i class="ph ph-credit-card text-brand-orange" style="font-size: 1.5rem;"></i>
                <div style="flex: 1;">Credit / Debit Card</div>
                <i class="ph-fill ph-check-circle text-brand-orange"></i>
            </div>
            <div class="payment-box">
                <i class="ph ph-wallet text-dark-brown" style="font-size: 1.5rem;"></i>
                <div style="flex: 1;">UPI / Wallet</div>
            </div>

            <button class="btn btn-primary w-100 mt-4 cursor-pointer" style="border: none; cursor: pointer;" onclick="processOrder()">Complete Purchase</button>
        </div>

        <div class="checkout-summary">
            <h3 class="font-display text-dark-brown text-lg mb-2">Order Summary</h3>
            <div id="checkout-items"></div>
            
            <div class="flex justify-between mt-2 pt-2 border-t-brown font-bold text-dark-brown text-lg">
                <span>Total</span>
                <span id="checkout-total">₹0</span>
            </div>
        </div>
    </main>

    <script>
        // Load cart
        const cart = JSON.parse(localStorage.getItem('nutspice_cart')) || [];
        const container = document.getElementById('checkout-items');
        const totalEl = document.getElementById('checkout-total');

        if(cart.length === 0) {
            container.innerHTML = '<p>Your cart is empty.</p>';
        } else {
            container.innerHTML = cart.map(item => `
                <div class="summary-item">
                    <img src="${item.img}" class="summary-img">
                    <div style="flex: 1;">
                        <h4 class="font-display text-dark-brown" style="font-size: 1rem;">${item.name}</h4>
                        <div class="text-sm text-choc-brown">Qty: ${item.qty}</div>
                    </div>
                    <div class="font-bold text-brand-orange">₹${item.price * item.qty}</div>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            totalEl.innerText = '₹' + total;
        }

        function processOrder() {
            if(cart.length === 0) {
                alert("Your cart is empty.");
                return window.location.href = 'shop.html';
            }
            alert("Order placed successfully! Redirecting to shop...");
            localStorage.removeItem('nutspice_cart');
            window.location.href = 'shop.html';
        }

        // Payment box toggles
        document.querySelectorAll('.payment-box').forEach(box => {
            box.addEventListener('click', function() {
                document.querySelectorAll('.payment-box').forEach(b => {
                    b.classList.remove('active');
                    const icon = b.querySelector('.ph-check-circle');
                    if(icon) icon.remove();
                });
                this.classList.add('active');
                this.innerHTML += '<i class="ph-fill ph-check-circle text-brand-orange"></i>';
            });
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="cart.js"></script>
</body>
</html>
